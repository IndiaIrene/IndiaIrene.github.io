<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>India Irene | GRC Analyst Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #e6edf3;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      background: #161b22;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #58a6ff;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 110px 20px 50px;
    }

    .hero h1 {
      font-size: 50px;
      color: #58a6ff;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aab4c0;
      max-width: 700px;
      margin: auto;
      font-size: 18px;
    }

    /* LINKEDIN BUTTON */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #58a6ff;
      color: #0b0f17;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #7bb8ff;
    }

    /* ICON STRIP */
    .icon-strip {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 13px;
      color: #aab4c0;
    }

    .icon-item img {
      width: 55px;   /* BIGGER */
      height: 55px;
      margin-bottom: 6px;
      background: white;   /* makes icons visible */
      padding: 6px;
      border-radius: 10px;
    }

    /* SECTIONS */
    section {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      color: #58a6ff;
      margin-bottom: 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #222b38;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #58a6ff;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #7d8590;
      font-size: 13px;
    }
  </style>
</head>

<body>

<nav>

</nav>
